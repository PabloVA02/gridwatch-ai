services:
  database:
    image: postgres:18.4-alpine
    environment:
      POSTGRES_DB: gridwatch
      POSTGRES_USER: gridwatch
      POSTGRES_PASSWORD: gridwatch-local
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gridwatch -d gridwatch"]
      interval: 5s
      timeout: 3s
      retries: 10
    volumes:
      - gridwatch-data:/var/lib/postgresql/data

  api:
    build: .
    environment:
      DATABASE_URL: postgresql+psycopg://gridwatch:gridwatch-local@database:5432/gridwatch
      MINIMUM_ANALYSIS_POINTS: 12
    ports:
      - "8000:8000"
    depends_on:
      database:
        condition: service_healthy

volumes:
  gridwatch-data:
